    <!--
      Statische Form-Definitionen für Netlify Forms.
      Netlify scannt nur statisches HTML beim Build, nicht React.
      Diese Forms werden NICHT angezeigt (hidden), dienen nur der Erkennung.
      Die echten Formulare in React posten per AJAX an "/" mit form-name.
    -->
    <form name="contact" netlify netlify-honeypot="website" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input type="text" name="website" />
    </form>

    <form name="ebook-download" netlify netlify-honeypot="website" hidden>
