    <!-- Critical CSS – minimal, identisch zu den realen Design-Tokens, damit beim React-Mount kein Layout-Flash entsteht. -->
    <style>
      @font-face{font-family:'Playfair Fallback';src:local('Georgia'),local('Times New Roman');size-adjust:107%;ascent-override:92%;descent-override:24%;line-gap-override:0%;}
      @font-face{font-family:'Montserrat Fallback';src:local('Arial'),local('Helvetica');size-adjust:107%;ascent-override:90%;descent-override:24%;line-gap-override:0%;}
      :root{--bg:#ffffff;--fg:hsl(270 35% 12%);--primary:hsl(270 45% 22%);--muted:hsl(270 25% 22%);}
      html{-webkit-text-size-adjust:100%;}
      html,body{margin:0;background:var(--bg);color:var(--fg);font-family:Montserrat,'Montserrat Fallback',ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
      img{max-width:100%;height:auto;display:block;}
      a{color:inherit;text-decoration:inherit;}
      .skip-link{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
      /* Pro-Shell: nur eine ruhige, korrekt eingefärbte Bühne — kein falsches Layout, das später ersetzt wird. */
      #app-shell{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;background:var(--bg);color:var(--primary);font-family:'Playfair Display','Playfair Fallback',Georgia,serif;text-align:center;padding:2rem;opacity:1;transition:opacity .35s ease;pointer-events:none;z-index:1;}
      #app-shell .wm{font-size:clamp(1.05rem,2vw,1.35rem);font-weight:600;letter-spacing:-.01em;line-height:1.3;max-width:32rem;}
      #app-shell .sp{width:28px;height:28px;border-radius:50%;border:2px solid hsl(270 22% 80%);border-top-color:hsl(270 45% 22%);animation:sh-sp .9s linear infinite;}
      @keyframes sh-sp{to{transform:rotate(360deg)}}
      .app-shell--gone{opacity:0 !important;}
    </style>

    <!-- Custom CSS bleibt editierbar, wird aber erst nach dem Seitenaufbau oder bei Termin-Interaktion geladen. -->
    <script>
      window.loadCustomCssOverrides=function(){if(document.querySelector('link[href="/custom.css"]'))return;var l=document.createElement('link');l.rel='stylesheet';l.href='/custom.css';document.head.appendChild(l)};
      window.addEventListener('load',function(){window.setTimeout(window.loadCustomCssOverrides,12000)},{once:true});
    </script>
  </head>

  <body>
    <!-- Skip-Link für Barrierefreiheit (BFSG/WCAG 2.1 AA) -->
    <a href="#main-content" class="skip-link">Zum Inhalt springen</a>

    <div id="root"></div>

    <!--
      Pro-Pattern Sofort-Shell: keine Fake-Navigation, keine Fake-Hero (würde
      beim React-Mount sichtbar ersetzt werden). Stattdessen eine ruhige,
      korrekt eingefärbte Bühne mit Wortmarke + Spinner. Sobald React rendert,
      wird die Shell sanft ausgeblendet und entfernt — kein Layout-Flash.
    -->
    <div id="app-shell" aria-hidden="true">
      <div class="wm">Systemisches Coaching &amp; Familienaufstellung</div>
      <div class="sp" role="presentation"></div>
      <noscript>
        <p style="max-width:32rem;font-family:Montserrat,'Montserrat Fallback',sans-serif;font-size:1rem;color:hsl(270 35% 12%)">Bitte aktiviere JavaScript, damit die Webseite mit Terminbuchung geladen werden kann.</p>
      </noscript>
    </div>
    <script>
      // Shell entfernen, sobald React etwas in #root gerendert hat.
      (function(){
        var root=document.getElementById('root');
        var shell=document.getElementById('app-shell');
        if(!root||!shell)return;
        var done=false;
        function remove(){
          if(done)return;done=true;
          shell.classList.add('app-shell--gone');
          setTimeout(function(){shell&&shell.parentNode&&shell.parentNode.removeChild(shell);},400);
        }
        var mo=new MutationObserver(function(){
          if(root.childElementCount>0){mo.disconnect();remove();}
        });
        mo.observe(root,{childList:true});
        // Sicherheitsnetz – Shell maximal 6s anzeigen.
        setTimeout(remove,6000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
