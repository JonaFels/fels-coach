[build]
  command = "npm run build && node scripts/prerender.js"
  publish = "dist"

# Security headers für alle Pfade
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
  Content-Security-Policy = "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; upgrade-insecure-requests;"

# Cache hashed assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# non-www -> www (301) - Konsistente Canonical-Domain auf www.fels-coach.de
[[redirects]]
  from = "https://fels-coach.de/*"
  to = "https://www.fels-coach.de/:splat"
  status = 301
  force = true

# http -> https (zusätzlich zu upgrade-insecure-requests, für Direktaufrufe)
[[redirects]]
  from = "http://fels-coach.de/*"
  to = "https://www.fels-coach.de/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.fels-coach.de/*"
  to = "https://www.fels-coach.de/:splat"
  status = 301
  force = true

# 301 redirects (alte Pfade -> neue URLs)
[[redirects]]
  from = "/en"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/en/*"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/fr"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/fr/*"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/angebote.html"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/ebook.html"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/buchen.html"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/termine/index.php"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/datenschutz.html"
  to = "https://www.fels-coach.de/datenschutz"
  status = 301
  force = true

# SPA Fallback - muss zuletzt stehen
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
