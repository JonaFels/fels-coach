[build]
  command = "npm run build && node scripts/prerender.js"
  publish = "dist"

# Cache hashed assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 301 redirects (alte Pfade -> neue URLs)
[[redirects]]
  from = "/en"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/en/*"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/fr"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/fr/*"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/angebote.html"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/ebook.html"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/buchen.html"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/termine/index.php"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "https://www.fels-coach.de/"
  status = 301
  force = true

[[redirects]]
  from = "/datenschutz.html"
  to = "https://www.fels-coach.de/datenschutz"
  status = 301
  force = true

# SPA Fallback - muss zuletzt stehen
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
