# Automatisches Deployment zu Goneo via FTP
# Bei jedem Push auf main wird die Seite gebaut und hochgeladen

name: Deploy to Goneo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Run SSG Prerender
        run: node scripts/prerender.js

      - name: Deploy to Goneo via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /  # Anpassen falls dein Webroot anders heißt (z.B. /httpdocs/ oder /public_html/)
